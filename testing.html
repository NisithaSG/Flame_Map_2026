<!DOCTYPE html>
<html>
<head>
    <title>FlameMap Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        #cy {
            width: 100%;
            height: 100vh;
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <div id="cy"></div>
    <script>
        fetch("http://localhost:8000/degrees/engineering-cs-bs-cs/graph")
            .then(res => res.json())
            .then(data => {
                const nodeIds = new Set(data.nodes.map(n => n.id))

                const seen = new Set()
                const nodes = data.nodes
                    .filter(n => {
                        if (seen.has(n.id)) return false
                        seen.add(n.id)
                        return true
                    })
                    .map(n => ({ data: { id: n.id, label: n.id } }))

                const edges = data.edges
                    .filter(e => nodeIds.has(e.source) && nodeIds.has(e.target))
                    .map(e => ({ data: { source: e.source, target: e.target } }))

                cytoscape({
                    container: document.getElementById("cy"),
                    elements: [...nodes, ...edges],
                    style: [
                        { selector: "node", style: { "label": "data(label)", "color": "#fff", "background-color": "#E8593C", "font-size": "10px" } },
                        { selector: "edge", style: { "line-color": "#555", "target-arrow-color": "#555", "target-arrow-shape": "triangle", "curve-style": "bezier" } }
                    ],
                    layout: { name: "breadthfirst", directed: true, padding: 20 }
                })
            })
    </script>
</body>
</html>
